<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body { zoom: 1.3; }</style>
<title>끌리메 교육팀 주간현황보고</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #0d1117; color: #1a202c; min-height: 100vh; }

/* ── 헤더 ── */
.page-header {
  background: #0d1117; padding: 12px 28px;
  display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  border-bottom: 1px solid #21262d;
}
.brand { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
.brand span { color: #60a5fa; }
.date-picker-wrap {
  display: flex; align-items: center; gap: 6px;
  background: #161b27; border: 1px solid #30363d; border-radius: 8px; padding: 5px 10px;
}
.date-picker-wrap label { font-size: 11px; color: #8b949e; white-space: nowrap; }
.date-nav { background: transparent; border: none; color: #8b949e; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.date-nav:hover { color: #fff; }
.date-input { background: transparent; border: none; color: #fff; font-size: 13px; font-weight: 700; width: 95px; outline: none; cursor: pointer; }
.date-input::-webkit-calendar-picker-indicator { filter: invert(0.6); cursor: pointer; width: 13px; }
.btn-today { background: #21262d; border: 1px solid #30363d; color: #8b949e; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 700; }
.btn-today:hover { color: #fff; background: #30363d; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.week-range-label { font-size: 12px; color: #8b949e; }
.btn-refresh { background: #1d4ed8; border: none; color: white; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
.btn-refresh:hover { background: #2563eb; }

/* ── 지표 스트립 ── */
.metrics-strip { background: #161b27; border-bottom: 1px solid #21262d; padding: 9px 28px; display: flex; align-items: center; gap: 0; flex-wrap: wrap; font-size: 12px; color: #8b949e; }
.strip-group { display: flex; align-items: center; gap: 6px; padding: 0 16px; }
.strip-group:first-child { padding-left: 0; }
.strip-divider { width: 1px; height: 16px; background: #30363d; flex-shrink: 0; }
.strip-label { color: #4b5563; font-weight: 600; white-space: nowrap; }
.strip-item { white-space: nowrap; }
.strip-item strong { color: #e2e8f0; font-weight: 800; }
.strip-updated { margin-left: auto; font-size: 11px; color: #4b5563; }

/* ── 메인 컨테이너 ── */
.container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }

/* ── 리포트 카드 ── */
.report-card { background: #fff; border-radius: 16px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 32px rgba(0,0,0,0.4); }
.card-header { padding: 14px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f1f5f9; background: #fafbfc; }
.card-tag { font-size: 10px; font-weight: 800; padding: 3px 12px; border-radius: 20px; letter-spacing: 0.5px; white-space: nowrap; }
.card-tag.weekly    { background: #dbeafe; color: #1d4ed8; }
.card-tag.monthly   { background: #ede9fe; color: #7c3aed; }
.card-tag.irregular { background: #fef3c7; color: #92400e; }
.card-title { font-size: 15px; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 8px; }
.card-title-dot { width: 10px; height: 10px; border-radius: 50%; background: #1C3557; flex-shrink: 0; }
.card-body { padding: 20px 24px; }

/* ── 타일 ── */
.tiles-sublabel { font-size: 10px; font-weight: 700; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }
.tiles-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }
.tile { border-radius: 14px; padding: 14px 18px; flex: 1; min-width: 110px; display: flex; flex-direction: column; gap: 4px; }
.tile-lbl { font-size: 10px; font-weight: 600; color: #64748b; letter-spacing: 0.3px; }
.tile-val { font-size: 32px; font-weight: 900; line-height: 1.1; }
.tile-sub { font-size: 10px; color: #94a3b8; }
.tile.blue   { background: #eff6ff; } .tile.blue   .tile-val { color: #1e40af; }
.tile.green  { background: #f0fdf4; } .tile.green  .tile-val { color: #166534; }
.tile.gray   { background: #f8fafc; } .tile.gray   .tile-val { color: #334155; }
.tile.purple { background: #faf5ff; } .tile.purple .tile-val { color: #6b21a8; }
.tile.teal   { background: #f0fdfa; } .tile.teal   .tile-val { color: #0f766e; }

/* ── 섹션 타이틀 ── */
.section-label { font-size: 11px; font-weight: 700; color: #64748b; display: flex; align-items: center; gap: 6px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.section-label::before { content: ''; width: 3px; height: 13px; background: #E11D48; border-radius: 2px; flex-shrink: 0; }
.sec-badge { background: #f1f5f9; color: #64748b; font-size: 10px; font-weight: 700; padding: 1px 8px; border-radius: 20px; }
.sec-badge.hot { background: #fee2e2; color: #dc2626; }

/* ── 교육 목록 ── */
.course-list { border: 1px solid #e8ecf0; border-radius: 12px; overflow: hidden; }
.course-list .empty { padding: 20px; text-align: center; color: #94a3b8; font-size: 13px; }
.course-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; border-bottom: 1px solid #f1f5f9; }
.course-row:last-child { border-bottom: none; }
.c-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.c-title { font-size: 13px; font-weight: 600; color: #1a202c; flex: 1; }
.c-date  { font-size: 11px; color: #94a3b8; white-space: nowrap; }
.c-type  { font-size: 10px; color: #64748b; background: #f1f5f9; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.c-stats { font-size: 11px; font-weight: 600; color: #1d4ed8; background: #eff6ff; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.c-cancelled { text-decoration: line-through; color: #94a3b8 !important; }
.badge-폐강 { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; background: #fee2e2; color: #dc2626; flex-shrink: 0; }

/* ── 과제 큰 지표 + 펼치기 ── */
.task-big-row { display: flex; gap: 12px; margin-bottom: 10px; }
.task-big-tile { flex: 1; border-radius: 12px; padding: 18px 20px; text-align: center; border: 1px solid #e8ecf0; }
.task-big-tile .tb-num { font-size: 42px; font-weight: 900; line-height: 1.1; }
.task-big-tile .tb-lbl { font-size: 12px; font-weight: 700; margin-top: 5px; }
.task-big-tile.completed { background: #f0fdf4; border-color: #bbf7d0; }
.task-big-tile.completed .tb-num { color: #16a34a; }
.task-big-tile.completed .tb-lbl { color: #166534; }
.task-big-tile.overdue { background: #fff5f5; border-color: #fecaca; }
.task-big-tile.overdue .tb-num { color: #dc2626; }
.task-big-tile.overdue .tb-lbl { color: #b91c1c; }
.task-big-tile.pending { background: #fffbeb; border-color: #fde68a; }
.task-big-tile.pending .tb-num { color: #d97706; }
.task-big-tile.pending .tb-lbl { color: #92400e; }
.btn-expand-task { width: 100%; padding: 9px; background: #f8fafc; border: 1px solid #e8ecf0; border-radius: 8px; color: #64748b; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.btn-expand-task:hover { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }
.task-detail-wrap { margin-top: 10px; }
.task-list-wrap { border: 1px solid #e8ecf0; border-radius: 12px; overflow: hidden; }
.task-item { padding: 10px 16px; border-bottom: 1px solid #f1f5f9; cursor: pointer; user-select: none; }
.task-item:last-child { border-bottom: none; }
.task-item:hover { background: #fafbfc; }
.task-row { display: flex; align-items: center; gap: 8px; }
.t-status { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; flex-shrink: 0; }
.status-COMPLETED   { background: #dcfce7; color: #16a34a; }
.status-OVERDUE     { background: #fee2e2; color: #dc2626; }
.status-PENDING     { background: #fef3c7; color: #d97706; }
.status-IN_PROGRESS { background: #fef3c7; color: #d97706; }
.t-title { font-size: 13px; font-weight: 600; flex: 1; }
.t-due   { font-size: 11px; color: #94a3b8; flex-shrink: 0; }
.t-arrow { font-size: 9px; color: #cbd5e1; transition: transform 0.2s; flex-shrink: 0; }
.task-detail { max-height: 0; overflow: hidden; transition: max-height 0.2s ease, padding 0.2s ease; font-size: 11px; color: #64748b; }
.task-item.expanded .task-detail { max-height: 60px; padding-top: 6px; }
.task-item.expanded .t-arrow { transform: rotate(90deg); }
.chip-row { display: flex; gap: 5px; flex-wrap: wrap; }
.chip { background: #f1f5f9; border-radius: 5px; padding: 1px 7px; font-size: 11px; color: #475569; }

/* ── 월간 테이블 ── */
.data-table { width: 100%; border-collapse: collapse; border: 1px solid #e8ecf0; border-radius: 12px; overflow: hidden; }
.data-table thead th { background: #1C3557; color: white; padding: 10px 16px; font-size: 11px; font-weight: 700; text-align: center; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
.data-table thead th:first-child { text-align: left; }
.data-table tbody td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #f1f5f9; text-align: center; vertical-align: middle; }
.data-table tbody td:first-child { text-align: left; font-weight: 700; color: #1C3557; }
.data-table tbody tr:last-child td { border-bottom: none; }
.data-table tbody tr:nth-child(even) td { background: #fafbfc; }
.data-table tbody tr.current-row td { background: #eff6ff; }
.data-table tbody tr.current-row td:first-child { color: #1d4ed8; }
.month-chip { display: inline-block; background: #dbeafe; color: #1d4ed8; font-size: 10px; font-weight: 700; padding: 1px 8px; border-radius: 20px; margin-left: 6px; }
.delta-chip { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 20px; }
.delta-chip.down { background: #dcfce7; color: #16a34a; }
.delta-chip.up   { background: #fee2e2; color: #dc2626; }
.delta-chip.none { background: #f1f5f9; color: #94a3b8; }
.v-good { color: #16a34a; font-weight: 700; }
.v-warn { color: #d97706; font-weight: 700; }
.v-bad  { color: #dc2626; font-weight: 700; }
.v-none { color: #cbd5e1; font-size: 12px; }
.score-bar-wrap { display: flex; align-items: center; gap: 8px; }
.score-bar-bg { flex: 1; height: 7px; background: #e8ecf0; border-radius: 4px; overflow: hidden; min-width: 60px; }
.score-bar-fill { height: 100%; border-radius: 4px; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
.score-val { font-size: 13px; font-weight: 800; width: 44px; text-align: right; }
.below70 { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: #fee2e2; color: #dc2626; font-weight: 700; }

/* ── 벨트 ── */
.belt-chip { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 800; }
.belt-화이트 { background: #f8fafc; color: #475569; border: 1px solid #e2e8f0; }
.belt-옐로우 { background: #fefce8; color: #854d0e; border: 1px solid #fef08a; }
.belt-레드   { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
.belt-블루   { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
.belt-실버   { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }
.belt-골드   { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
.belt-퍼플   { background: #faf5ff; color: #7e22ce; border: 1px solid #e9d5ff; }
.belt-블랙   { background: #1e293b; color: #f8fafc; border: 1px solid #334155; }
.prog-chips { display: flex; gap: 5px; flex-wrap: wrap; }
.prog-chip { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 5px; padding: 1px 7px; font-size: 11px; color: #475569; white-space: nowrap; }
.prog-chip.top { background: #fff1f2; border-color: #fecdd3; color: #be123c; }

/* ── 비정기 주요업무 ── */
.irr-table { width: 100%; border-collapse: collapse; overflow: hidden; }
.irr-table th { background: #1C3557; color: white; padding: 9px 14px; font-size: 11px; font-weight: 700; text-align: left; print-color-adjust: exact; -webkit-print-color-adjust: exact; }
.irr-table td { padding: 7px 10px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
.irr-table tr:last-child td { border-bottom: none; }
.irr-table tr:hover td { background: #fafbfc; }
.irr-wrap { border: 1px solid #e8ecf0; border-radius: 12px; overflow: hidden; }
.irr-input { width: 100%; border: none; background: transparent; font-family: inherit; font-size: 13px; color: #1a202c; outline: none; padding: 3px 4px; border-radius: 4px; }
.irr-input:focus { background: #eff6ff; }
.irr-input::placeholder { color: #cbd5e1; }
.irr-textarea { resize: none; min-height: 36px; overflow: hidden; line-height: 1.5; white-space: pre-wrap; }
.irr-date { font-size: 11px; padding: 3px 2px; cursor: pointer; }
.irr-content-view { font-size: 13px; color: #1a202c; white-space: pre-wrap; word-break: break-word; line-height: 1.6; padding: 2px 0; }
.irr-status-sel { border: 1px solid #e8ecf0; border-radius: 6px; font-size: 11px; font-weight: 700; padding: 4px 6px; cursor: pointer; outline: none; font-family: inherit; width: 100%; }
.irr-del { background: #fee2e2; border: none; border-radius: 6px; color: #dc2626; font-size: 11px; font-weight: 700; padding: 5px 10px; cursor: pointer; font-family: inherit; white-space: nowrap; }
.irr-del:hover { background: #fca5a5; }
.irr-empty { padding: 32px; text-align: center; color: #94a3b8; font-size: 13px; }
.btn-add-row { margin-top: 10px; width: 100%; padding: 10px; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 8px; color: #64748b; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.btn-add-row:hover { background: #eff6ff; border-color: #93c5fd; color: #1d4ed8; }

/* ── 공통 ── */
.section-block { margin-bottom: 22px; }
.section-block:last-child { margin-bottom: 0; }
.loading { text-align: center; padding: 80px 20px; }
.loading .spinner { width: 36px; height: 36px; border: 3px solid #21262d; border-top-color: #60a5fa; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
.loading p { color: #4b5563; font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { background: #450a0a; border: 1px solid #991b1b; border-radius: 12px; padding: 16px 20px; color: #fca5a5; font-size: 13px; }

@media print {
  body { background: white; }
  .page-header { background: #1C3557 !important; print-color-adjust: exact; }
  .metrics-strip { display: none; }
  .report-card { box-shadow: none; border: 1px solid #e8ecf0; }
  .btn-refresh, .date-nav, .btn-today, .btn-expand-task, .irr-del, .btn-add-row { display: none !important; }
  #taskDetailWrap { display: block !important; }
}
@media (max-width: 700px) {
  .tiles-row { flex-wrap: wrap; }
  .tile { min-width: 44%; }
  .tile-val { font-size: 26px; }
  .metrics-strip { display: none; }
  .task-big-row { gap: 8px; }
  .task-big-tile .tb-num { font-size: 30px; }
  .data-table { font-size: 12px; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="page-header">
  <div class="brand">끌리메 <span>·</span> 교육팀</div>
  <div class="date-picker-wrap">
    <label>기준 주간</label>
    <button class="date-nav" onclick="moveWeek(-1)">‹</button>
    <input type="date" class="date-input" id="datePicker" onchange="onDatePick()">
    <button class="date-nav" onclick="moveWeek(1)">›</button>
  </div>
  <button class="btn-today" onclick="goToday()">오늘</button>
  <div class="header-right">
    <span class="week-range-label" id="weekLabel">-</span>
    <button class="btn-refresh" onclick="refresh()">↻ 새로고침</button>
  </div>
</div>

<div class="metrics-strip" id="metricsStrip">
  <span style="color:#4b5563">불러오는 중...</span>
</div>

<div class="container">
  <div id="mainContent">
    <div class="loading"><div class="spinner"></div><p>데이터를 가져오는 중입니다...</p></div>
  </div>
  <div id="irregularCard"></div>
</div>

<script>
let currentWeekStart = getWeekStart(new Date());
let _taskExpanded = false;

function getWeekStart(d) {
  const day = new Date(d);
  const dow = day.getDay();
  day.setDate(day.getDate() + (dow === 0 ? -6 : 1 - dow));
  day.setHours(0,0,0,0);
  return day;
}
function toISO(d) { return d.toISOString().split('T')[0]; }

function weekRangeLabel(ws) {
  const we = new Date(ws); we.setDate(we.getDate() + 6);
  const thisWs = getWeekStart(new Date());
  let tag = '';
  if (toISO(ws) === toISO(thisWs)) tag = ' · 이번 주';
  else if (toISO(ws) === toISO(new Date(thisWs.getTime() + 7*864e5))) tag = ' · 다음 주';
  else if (toISO(ws) === toISO(new Date(thisWs.getTime() - 7*864e5))) tag = ' · 지난 주';
  return `${ws.getMonth()+1}/${ws.getDate()} ~ ${we.getMonth()+1}/${we.getDate()}${tag}`;
}

function moveWeek(delta) { currentWeekStart = new Date(currentWeekStart.getTime() + delta*7*864e5); loadData(); }
function goToday() { currentWeekStart = getWeekStart(new Date()); loadData(); }
function onDatePick() {
  const v = document.getElementById('datePicker').value;
  if (v) { currentWeekStart = getWeekStart(new Date(v + 'T12:00:00')); loadData(); }
}

async function loadData() {
  document.getElementById('weekLabel').textContent = weekRangeLabel(currentWeekStart) + '  로딩 중...';
  irrLoadFromServer();  // 주차 이동 시 비정기 업무도 함께 갱신
  try {
    const res = await fetch(`/api/weekly?weekStart=${toISO(currentWeekStart)}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    render(data);
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<div class="error-box">❌ 데이터 로드 실패: ${e.message}</div>`;
    document.getElementById('metricsStrip').innerHTML = '';
    document.getElementById('weekLabel').textContent = '오류 발생';
  }
}

async function refresh() {
  document.getElementById('weekLabel').textContent = '새로고침 중...';
  await fetch('/api/refresh');
  await loadData();
}

function render(data) {
  document.getElementById('datePicker').value = data.week.start;
  document.getElementById('weekLabel').textContent = weekRangeLabel(currentWeekStart);

  const d  = data.dashboard;
  const c  = data.courses;
  const t  = data.tasks;
  const es = data.eval_stats      || {};
  const bs = data.belt_summary    || [];
  const mh = data.monthly_history || [];
  const ws = data.weekly_stats    || {};
  const cm = data.current_month   || '';
  const ds = d.stats              || {};
  const rr = data.roster_retention || {};

  document.getElementById('metricsStrip').innerHTML = `
    <div class="strip-group">
      <span class="strip-label">이달 누적</span>
      <span class="strip-item">교육생 <strong>${ds.students ?? '-'}명</strong></span>
      <span class="strip-item">수료 <strong>${ds.graduates ?? '-'}명</strong></span>
      <span class="strip-item">전체교육 <strong>${ds.total_edu ?? '-'}건</strong></span>
      <span class="strip-item">수료완료 <strong>${ds.completed ?? '-'}건</strong></span>
    </div>
    <div class="strip-divider"></div>
    <div class="strip-group">
      <span class="strip-label">이번 주</span>
      <span class="strip-item">교육 <strong>${ws.course_count ?? '-'}건</strong></span>
      <span class="strip-item">교육생 <strong>${ws.enrolled ?? '-'}명</strong></span>
      <span class="strip-item">수료 <strong>${ws.attended ?? '-'}명</strong></span>
    </div>
    <span class="strip-updated">${data.generated_at}</span>
  `;

  let html = '';

  // ══════════════════════════════════════════════
  // 카드 1: 주간보고
  // ══════════════════════════════════════════════
  html += `<div class="report-card">
    <div class="card-header">
      <span class="card-tag weekly">끌리메 주간보고</span>
      <div class="card-title"><div class="card-title-dot"></div>이번 주 교육 현황</div>
      <span style="margin-left:auto;font-size:11px;color:#8b949e">${data.week.start} ~ ${data.week.end}</span>
    </div>
    <div class="card-body">`;

  const mc  = data.monthly_completion ?? 0;
  const wd  = ws.delta || {};
  const wRate   = ws.completion_rate;
  const prevRate = ws.prev_completion_rate;
  const prevWs  = ws.prev || {};

  function dArrow(v) { return v > 0 ? '↑' : v < 0 ? '↓' : '→'; }
  function dColor(v) { return v == null ? '#94a3b8' : v > 0 ? '#16a34a' : v < 0 ? '#dc2626' : '#94a3b8'; }
  function rColor(r) { return r == null ? '#64748b' : r >= 80 ? '#166534' : r >= 60 ? '#92400e' : '#991b1b'; }
  function rBg(r)    { return r == null ? '#f8fafc' : r >= 80 ? '#f0fdf4' : r >= 60 ? '#fffbeb' : '#fff5f5'; }

  // ── 한 줄 결론 배너 ──
  const isGood = (wRate ?? 0) >= 80 && (ws.completion ?? 0) > 0;
  const hasAlert = (wRate ?? 0) < 80 || !(ws.completion);
  const badgeHtml = isGood
    ? `<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#166534;background:#dcfce7">양호</span>`
    : hasAlert
      ? `<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#92400e;background:#fef3c7">주의</span>`
      : `<span style="display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:800;color:#64748b;background:#f1f5f9">집계중</span>`;

  // 수료율 전주 대비 표현
  const rateDelta = (wd && wd.completion_rate != null) ? wd.completion_rate : null;
  const rateDeltaStr = rateDelta != null
    ? `(전주 대비 ${rateDelta > 0 ? '↑' : rateDelta < 0 ? '↓' : '→'}${Math.abs(rateDelta)}%p)`
    : '';

  // 미수료해소 표현
  const completionStr = (ws.completion ?? 0) > 0
    ? `미수료 해소 ${ws.completion}건 처리`
    : '미수료 해소 미진행';

  let summaryText;
  if ((ws.course_count ?? 0) === 0 && (ws.enrolled ?? 0) === 0) {
    summaryText = '이번 주 집계된 교육 데이터가 없습니다.';
  } else {
    const rateStr = wRate != null ? `수료율 ${wRate}% ${rateDeltaStr}`.trim() : '';
    const parts = [
      `이번 주 교육 ${ws.course_count ?? 0}건 진행`,
      (ws.enrolled ?? 0) > 0 ? `${ws.attended ?? 0}명/${ws.enrolled}명 수료` : null,
      rateStr || null,
      completionStr,
    ].filter(Boolean);
    summaryText = parts.join(' · ');
  }

  html += `<div style="border-left:3px solid #f59e0b;background:#fffbeb;padding:12px 16px;margin-bottom:16px;border-radius:0 10px 10px 0">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
      ${badgeHtml}
      <span style="font-size:11px;font-weight:700;color:#92400e">이번 주 한 줄 결론</span>

    <div style="font-size:13px;color:#1a202c;line-height:1.65">${summaryText}</div>

  // ── 이번 주 타일 (델타 포함) ──
  html += `<div class="section-block">
    <div class="tiles-sublabel">이번 주 주요 지표</div>
    <div class="tiles-row">
      <div class="tile purple">
        <div class="tile-lbl">이번 주 교육</div>
        <div style="display:flex;align-items:baseline;gap:5px">
          <div class="tile-val">${ws.course_count ?? '-'}건</div>
          ${wd.course_count != null ? `<span style="font-size:15px;font-weight:800;color:${dColor(wd.course_count)}">${dArrow(wd.course_count)}${Math.abs(wd.course_count)}</span>` : ''}
        </div>
        <div class="tile-sub">${prevWs.course_count != null ? '전주 ' + prevWs.course_count + '건' : '전주 비교 없음'}</div>
      </div>
      <div class="tile purple">
        <div class="tile-lbl">주간 수료</div>
        <div style="display:flex;align-items:baseline;gap:5px">
          <div class="tile-val">${ws.attended ?? '-'}명</div>
          ${wd.attended != null ? `<span style="font-size:15px;font-weight:800;color:${dColor(wd.attended)}">${dArrow(wd.attended)}${Math.abs(wd.attended)}</span>` : ''}
        </div>
        <div class="tile-sub">신청 ${ws.enrolled ?? '-'}명${prevWs.attended != null ? ' · 전주 ' + prevWs.attended + '명' : ''}</div>
      </div>
      <div class="tile" style="background:${rBg(wRate)}">
        <div class="tile-lbl">주간 수료율</div>
        <div class="tile-val" style="color:${rColor(wRate)}">${wRate != null ? wRate + '%' : '-'}</div>
        <div class="tile-sub">${(ws.enrolled ?? 0) > 0 ? ws.attended + '/' + ws.enrolled : '-'}${prevRate != null ? ' · 전주 ' + prevRate + '%' : ''}</div>
      </div>
      <div class="tile" style="background:${(ws.completion ?? 0) > 0 ? '#f0fdfa' : '#fffbeb'}">
        <div class="tile-lbl">미수료 해소</div>
        <div class="tile-val" style="color:${(ws.completion ?? 0) > 0 ? '#0f766e' : '#92400e'}">${ws.completion ?? 0}건</div>
        <div class="tile-sub" style="color:${(ws.completion ?? 0) > 0 ? '#0f766e' : '#d97706'};font-weight:700">${(ws.completion ?? 0) > 0 ? '1회차 수료' : '미진행'}</div>
      </div>
    </div>
  </div>`;

  // 이번 주 교육
  const tw = c.this_week || [];
  html += `<div class="section-block">
    <div class="section-label">이번 주 진행 교육 <span class="sec-badge ${tw.length ? 'hot' : ''}">${tw.length}건</span></div>
    <div class="course-list">`;
  if (!tw.length) html += `<div class="empty">이번 주 진행 교육이 없습니다</div>`;
  else tw.forEach(cr => { html += courseRow(cr, '#E11D48', true); });
  html += `</div></div>`;

  // 다음 주 예정
  const nw = c.next_week || [];
  html += `<div class="section-block">
    <div class="section-label">다음 주 예정 교육 <span class="sec-badge">${nw.length}건</span></div>
    <div class="course-list">`;
  if (!nw.length) html += `<div class="empty">다음 주 예정 교육이 없습니다</div>`;
  else nw.forEach(cr => { html += courseRow(cr, '#3b82f6', false); });
  html += `</div></div>`;

  // 폐강
  const cancelled = data.cancelled || [];
  if (cancelled.length) {
    html += `<div class="section-block">
      <div class="section-label">폐강·삭제 교육 <span class="sec-badge">${cancelled.length}건</span></div>

    cancelled.forEach(cr => {
      const del = cr.deletedAt ? `<span style="font-size:10px;color:#94a3b8">삭제: ${cr.deletedAt}</span>` : '';
      html += `<div class="course-row" style="background:#fafafa">
        <div class="c-dot" style="background:#cbd5e1"></div>
        <div class="c-title c-cancelled">${cr.title}</div>
        <div class="c-date">${cr.startDate}</div>
        ${del}
        <span class="badge-폐강">폐강</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  // 주간 과제 현황
  html += `<div class="section-block">
    <div class="section-label">주간 과제 현황 <span class="sec-badge">${t.total}건</span></div>
    <div class="task-big-row">
      <div class="task-big-tile completed">
        <div class="tb-num">${t.completed}</div>
        <div class="tb-lbl">완료</div>
      </div>
      <div class="task-big-tile overdue">
        <div class="tb-num">${t.overdue}</div>
        <div class="tb-lbl">지연</div>
      </div>
      <div class="task-big-tile pending">
        <div class="tb-num">${(t.pending||0) + (t.in_progress||0)}</div>
        <div class="tb-lbl">진행중</div>
      </div>
    </div>
    <button class="btn-expand-task" id="taskExpandBtn" onclick="toggleTaskDetail()">
      ${_taskExpanded ? '세부 내역 접기 ▲' : '세부 내역 보기 ▼'}
    </button>
    <div id="taskDetailWrap" class="task-detail-wrap" style="display:${_taskExpanded ? 'block' : 'none'}">`;

  if (t.tasks && t.tasks.length) {
    html += `<div class="task-list-wrap">`;
    const statusRank = s => s === 'OVERDUE' ? 0 : s === 'COMPLETED' ? 2 : 1;
    const sorted = [...t.tasks].sort((a,b) => statusRank(a.status) - statusRank(b.status));
    sorted.slice(0,20).forEach(task => {
      const lbl = {COMPLETED:'완료',OVERDUE:'지연',PENDING:'진행중'}[task.status] || '진행중';
      const chips = [task.branchName, task.beauticianName, task.courseTitle].filter(Boolean);
      const detail = chips.length
        ? `<div class="chip-row">${chips.map(ch=>`<span class="chip">${ch}</span>`).join('')}${task.dueDate?`<span class="chip">마감: ${task.dueDate}</span>`:''}</div>`
        : (task.dueDate ? `<div class="chip-row"><span class="chip">마감: ${task.dueDate}</span></div>` : '');
      html += `<div class="task-item" onclick="this.classList.toggle('expanded')">
        <div class="task-row">
          <span class="t-status status-${task.status}">${lbl}</span>

          <div class="t-due">${task.dueDate||''}</div>
          <span class="t-arrow">▶</span>
        </div>
        <div class="task-detail">${detail}</div>
      </div>`;
    });
    if (t.tasks.length > 20) html += `<div style="text-align:center;padding:10px;color:#94a3b8;font-size:12px">외 ${t.tasks.length-20}건</div>`;
    html += `</div>`;
  } else {
    html += `<div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px">과제가 없습니다</div>`;
  }

  html += `</div></div>`; // taskDetailWrap + section-block
  html += `</div></div>`; // card-body + 주간 report-card

  // ══════════════════════════════════════════════
  // 카드 2: 월간보고
  // ══════════════════════════════════════════════
  html += `<div class="report-card">
    <div class="card-header">
      <span class="card-tag monthly">끌리메 월간보고</span>
      <div class="card-title"><div class="card-title-dot" style="background:#7c3aed"></div>월별 현황 지표</div>
    </div>
    <div class="card-body">`;

  // 이달 누적 · 교육 전환 (깔때기 막대)
  const mts = data.monthly_type_stats || {};
  const TYPE_ORDER = ['아카데미 교육', '특별 교육'];
  const knownTypes = TYPE_ORDER.filter(t => mts[t]);
  const otherTypes = Object.keys(mts).filter(t => !TYPE_ORDER.includes(t));
  const allTypes = [...knownTypes, ...otherTypes];

  html += `<div class="section-block">
    <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:13px;font-weight:800;color:#1a202c">이달 교육 현황</div>
      <div style="font-size:11px;color:#94a3b8">${cm}</div>
    </div>`;

  if (allTypes.length > 0) {
    allTypes.forEach((typeName, ti) => {
      const s = mts[typeName];
      if (!s) return;
      const isAcademy = typeName === '아카데미 교육';
      const attendPct = s.enrolled > 0 ? Math.round(s.attended / s.enrolled * 100) : 0;
      const firstPct  = s.enrolled > 0 ? Math.round((s.first_time ?? 0) / s.enrolled * 100) : 0;
      html += `<div style="display:flex;align-items:center;gap:0;padding:11px 0;${ti < allTypes.length - 1 ? 'border-bottom:1px solid #f1f5f9' : ''}">
        <div style="font-size:12px;font-weight:700;color:#334155;min-width:90px;flex-shrink:0">${typeName}</div>
        <div style="display:flex;gap:0;flex:1;flex-wrap:wrap">
          <div style="min-width:72px;text-align:center">
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">신청</div>
            <div style="font-size:18px;font-weight:800;color:#1a202c;line-height:1">${s.enrolled}<span style="font-size:11px;font-weight:400;color:#94a3b8">명</span></div>
          </div>
          <div style="min-width:12px;display:flex;align-items:center;padding-top:12px;color:#d1d5db;font-size:11px">›</div>
          <div style="min-width:72px;text-align:center">
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">${isAcademy ? '참석' : '수료'}</div>
            <div style="font-size:18px;font-weight:800;color:#1a202c;line-height:1">${s.attended}<span style="font-size:11px;font-weight:400;color:#94a3b8">명</span>${attendPct < 100 ? `<span style="font-size:10px;color:#94a3b8;font-weight:400;margin-left:2px">${attendPct}%</span>` : ''}</div>
          </div>
          ${isAcademy ? `
          <div style="min-width:12px;display:flex;align-items:center;padding-top:12px;color:#d1d5db;font-size:11px">›</div>
          <div style="min-width:72px;text-align:center">
            <div style="font-size:10px;color:#94a3b8;margin-bottom:2px">1회차</div>
            <div style="font-size:18px;font-weight:800;color:#1a202c;line-height:1">${s.first_time ?? 0}<span style="font-size:11px;font-weight:400;color:#94a3b8">명</span>${firstPct > 0 ? `<span style="font-size:10px;color:#94a3b8;font-weight:400;margin-left:2px">${firstPct}%</span>` : ''}</div>
          </div>` : ''}
        </div>
      </div>`;
    });
    const totalEnrolled = allTypes.reduce((s, t) => s + (mts[t]?.enrolled || 0), 0);
    const totalAttended = allTypes.reduce((s, t) => s + (mts[t]?.attended || 0), 0);
    if (totalEnrolled > 0) {
      html += `<div style="padding-top:8px;font-size:11px;color:#94a3b8;border-top:1px solid #f1f5f9">이달 합계 · 교육생 <strong style="color:#64748b">${totalEnrolled}명</strong> · 수료인원 <strong style="color:#64748b">${totalAttended}명</strong></div>`;
    }
  } else {
    html += `<div style="color:#94a3b8;font-size:13px;padding:16px 0">이달 교육 데이터가 없습니다</div>`;
  }

  html += `<div style="margin-top:10px;display:flex;align-items:baseline;gap:10px;padding-top:10px;border-top:1px solid #f1f5f9">
    <span style="font-size:12px;font-weight:700;color:#64748b">당월 미수료해소건</span>
    <span style="font-size:22px;font-weight:900;color:#334155">${mc}건</span>
    <span style="font-size:11px;color:#94a3b8">아카데미 1회차 수강 완료</span>
  </div>
  </div>`;

  // 신규입사자 재직률 (막대 추세 + 스택바)
  html += `<div class="section-block">`;
  if (!rr || rr.all_active === undefined) {
    html += `<div class="course-list"><div class="empty">인명부 데이터를 불러올 수 없습니다</div></div>`;
  } else {
    const refMonths = rr.ref_months || [];
    const byMonth   = rr.by_month   || {};
    const stab      = rr.stability  || {};
    const stabTotal = Object.values(stab).reduce((a,b) => a+b, 0);
    const rate      = rr.rate;
    const rateColor = rate == null ? '#64748b' : rate >= 80 ? '#166534' : rate >= 60 ? '#92400e' : '#991b1b';
    const mLabel    = mk => `${parseInt(mk.split('-')[1])}월`;

    // 헤더: 제목 + 전체 재직률
    html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:13px;font-weight:800;color:#1a202c">신규입사자 재직률 <span style="font-size:11px;font-weight:400;color:#94a3b8">· 화이트벨트</span></div>
      <div style="text-align:right">
        <span style="font-size:30px;font-weight:900;color:${rateColor}">${rate != null ? rate + '%' : '-'}</span>
        <span style="font-size:11px;color:#94a3b8;margin-left:6px">직전 3개월 · ${rr.active_cohort ?? 0}/${rr.total_cohort ?? 0}명</span>
      </div>
    </div>`;

    // 월별 막대 차트 ([M-3, M-2, M-1, 이번달])
    const allRetMonths = [...[...refMonths].reverse(), rr.current_month].filter(Boolean);
    const maxBarH = 80;

    html += `<div style="display:flex;align-items:flex-end;gap:10px;height:${maxBarH + 28}px;margin-bottom:0">`;
    allRetMonths.forEach(mk => {
      const isCur = mk === rr.current_month;
      const bm    = isCur ? (rr.current_month_data || {}) : (byMonth[mk] || {});
      const tot   = bm.total  ?? 0;
      const act   = bm.active ?? 0;
      const pct   = tot > 0 ? Math.round(act / tot * 100) : null;
      const isLow = pct != null && pct < 60;
      const barBg = isCur ? '#1C3557' : isLow ? '#fef3c7' : '#d1d5db';
      const barBd = isCur ? '#1C3557' : isLow ? '#d97706' : '#d1d5db';
      const numC  = isCur ? '#1C3557' : isLow ? '#92400e' : '#64748b';
      const barH  = pct != null ? Math.max(12, Math.round(pct / 100 * maxBarH)) : 12;
      html += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:flex-end">
        <div style="font-size:12px;font-weight:800;color:${numC}">${pct != null ? pct + '%' : '-'}</div>
        <div style="width:100%;height:${barH}px;background:${barBg};border:1px solid ${barBd};border-radius:4px 4px 0 0"></div>
      </div>`;
    });
    html += `</div>`;

    // 월 라벨
    html += `<div style="display:flex;gap:10px;border-top:1px solid #e8ecf0;padding-top:5px;margin-bottom:10px">`;
    allRetMonths.forEach(mk => {
      const isCur = mk === rr.current_month;
      html += `<div style="flex:1;text-align:center;font-size:11px;color:${isCur ? '#1C3557' : '#94a3b8'};font-weight:${isCur ? '700' : '400'}">${mLabel(mk)}</div>`;
    });
    html += `</div>`;

    // 해석 주석
    const curD  = rr.current_month_data || {};
    const curMk = rr.current_month || '';
    if (curMk) {
      const curPctV = (curD.total ?? 0) > 0 ? Math.round((curD.active ?? 0) / curD.total * 100) : null;
      const prevRatesArr = [...refMonths].reverse().map(mk => {
        const bm = byMonth[mk] || {};
        return bm.total > 0 ? Math.round(bm.active / bm.total * 100) : null;
      }).filter(r => r != null);
      const minPrev = prevRatesArr.length ? Math.min(...prevRatesArr) : null;
      let note = '';
      if ((curD.total ?? 0) > 0 && (curD.total ?? 0) <= 4) {
        note = `${mLabel(curMk)} 코호트는 입사 초기라 이탈 관찰기간이 짧음(해석 주의).`;
      } else if (minPrev != null && minPrev < 60) {
        const minIdx = prevRatesArr.lastIndexOf(minPrev);
        const minM = mLabel(([...refMonths].reverse())[minIdx] || curMk);
        note = `${minM} 저점(${minPrev}%) 후 추이 지속 모니터링 필요.`;
      }
      if (note) html += `<div style="font-size:11px;color:#94a3b8;margin-bottom:12px">${note}</div>`;
    }

    // 근무안정도 (100% 스택바)
    if (stabTotal > 0) {
      const stabSeg = [
        { label:'안정',   val:(stab['매우안정']||0)+(stab['안정']||0), barBg:'#dcfce7', textColor:'#166534' },
        { label:'보통',   val:stab['보통']||0,                           barBg:'#fef3c7', textColor:'#92400e' },
        { label:'불안정', val:stab['불안정']||0,                         barBg:'#fee2e2', textColor:'#991b1b' },
      ].filter(s => s.val > 0);
      const legendAll = [
        { label:'안정',   val:(stab['매우안정']||0)+(stab['안정']||0), dot:'#16a34a' },
        { label:'보통',   val:stab['보통']||0,                           dot:'#d97706' },
        { label:'불안정', val:stab['불안정']||0,                         dot:'#dc2626' },

function initMhCharts(mh, cm) {
  if (!window.Chart || !mh || mh.length < 2) return;
  ['_mhC2','_mhC3'].forEach(k => {
    if (window[k]) { try { window[k].destroy(); } catch(e) {} window[k] = null; }
  });

  const recent = [...mh].reverse().slice(0,6).reverse();
  const labels = recent.map(r => parseInt(r.month.slice(5)) + '월');

  const base = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } },
      tooltip: { titleFont: { size: 11 }, bodyFont: { size: 11 } }
    },
    scales: {
      x: { ticks: { font: { size: 10 }, color: '#94a3b8' }, grid: { display: false } },
      y: { ticks: { font: { size: 10 }, color: '#94a3b8' }, grid: { color: '#f1f5f9' } }
    }
  };

  const c2 = document.getElementById('mhChart2');
  if (c2) {
    window._mhC2 = new Chart(c2, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: '재교육 필요 비율',
            data: recent.map(r => r.re_edu_ratio ?? null),
            borderColor: '#d97706', backgroundColor: 'transparent',
            tension: 0.4, borderDash: [5,3],
            pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#d97706',
          },
          {
            label: '신규 정착률',
            data: recent.map(r => r.retention_rate ?? null),
            borderColor: '#16a34a', backgroundColor: 'rgba(22,163,74,0.07)',
            fill: true, tension: 0.4,
            pointRadius: 4, pointHoverRadius: 6, pointBackgroundColor: '#16a34a',
          }
        ]
      },
      options: {
        ...base,
        scales: {
          ...base.scales,
          y: { ...base.scales.y, min: 0, max: 100, ticks: { ...base.scales.y.ticks, callback: v => v + '%' } }
        }
      }
    });
  }

  const c3 = document.getElementById('mhChart3');
  if (c3) {
    window._mhC3 = new Chart(c3, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: '미수료해소건',
          data: recent.map(r => r.completion ?? 0),
          backgroundColor: recent.map(r => r.month === cm ? '#1d4ed8' : '#93c5fd'),
          borderRadius: 5,
          borderSkipped: false,
        }]
      },
      options: {
        ...base,
        plugins: { ...base.plugins, legend: { display: false } },
        scales: {
          ...base.scales,
          y: { ...base.scales.y, beginAtZero: true, ticks: { ...base.scales.y.ticks, stepSize: 1 } }
        }
      }
    });
  }
}

let _irrRows = [];

async function irrLoadFromServer() {
  _irrWeek = toISO(currentWeekStart);
  try {
    const res = await fetch(`/api/irr_tasks?week=${_irrWeek}`);
    _irrRows = await res.json();

async function irrPost(body) {
  const res = await fetch('/api/irr_tasks', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ ...body, password: _irrAdmin, week_start: _irrWeek })
  });
  const data = await res.json();
  if (res.status === 403) { alert('비밀번호가 틀렸습니다.'); _irrAdmin = ''; sessionStorage.removeItem('irr_admin'); renderIrregular(); return false; }
  _irrRows = data.tasks || _irrRows;
  renderIrregular();
  return true;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function parsePeriodDate(period, which) {
  if (!period) return '';
  const parts = String(period).split('~');
  let raw = (which === 'start' ? parts[0] : parts[1] || '').trim();
  if (!raw) return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(raw)) return raw;
  const md = raw.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (md) {
    const y = new Date().getFullYear();
    return `${y}-${md[1].padStart(2,'0')}-${md[2].padStart(2,'0')}`;
  }
  return '';
}

function formatPeriodFromInputs(idx) {
  const row = document.querySelector(`[data-irr="${idx}"]`);
  if (!row) return;
  const s = row.querySelector('.irr-ds').value;
  const e = row.querySelector('.irr-de').value;
  const fmt = v => { if (!v) return ''; const [,m,d] = v.split('-'); return `${parseInt(m)}/${parseInt(d)}`; };
  const period = [fmt(s), fmt(e)].filter(Boolean).join('~');
  irrUpdate(idx, 'period', period);
}

  //                  '다음주' → 이번주 실행 계획

        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor}"></span>
        ${label}
        <span style="font-size:10px;font-weight:400;color:#94a3b8">${group.length}건</span>
      </div>`;
    if (!group.length) {
      s += `<div style="padding:14px 18px;border:1px dashed #e8ecf0;border-radius:8px;text-align:center;color:#94a3b8;font-size:13px">${isAdmin ? '아래 버튼으로 추가하세요' : '내역 없음'}</div>`;
    } else {
      s += `<div style="overflow-x:auto"><div class="irr-wrap"><table class="irr-table">
        <thead><tr>
          <th style="width:20%">업무명</th>
          <th style="width:28%">세부 내용</th>
          <th style="width:16%">기간</th>
          <th style="width:10%">상태</th>
          <th>비고</th>
          ${isAdmin ? '<th style="width:50px;text-align:center"></th>' : ''}
        </tr></thead><tbody>`;
      group.forEach(({ r, i }) => {
        const sc = IRR_COLOR[r.status] || '#1a202c';
        const sb = IRR_BG[r.status]    || '#f1f5f9';
        const ds = parsePeriodDate(r.period, 'start');
        const de = parsePeriodDate(r.period, 'end');
        if (isAdmin) {
          const opts = IRR_STATUS.map(st =>
            `<option value="${st}"${st === r.status ? ' selected' : ''}>${st}</option>`
          ).join('');
          s += `<tr data-irr="${i}">
            <td><input class="irr-input" value="${esc(r.name)}" placeholder="업무명" onchange="irrUpdate(${i},'name',this.value)"></td>
            <td><textarea class="irr-input irr-textarea" placeholder="세부 내용" oninput="autoResizeTA(this)" onchange="irrUpdate(${i},'content',this.value)">${esc(r.content)}</textarea></td>
            <td>
              <div style="display:flex;align-items:center;gap:3px;flex-wrap:wrap">
                <input type="date" class="irr-input irr-date irr-ds" value="${ds}" onchange="formatPeriodFromInputs(${i})" style="flex:1;min-width:110px">
                <span style="color:#94a3b8;font-size:11px;flex-shrink:0">~</span>
                <input type="date" class="irr-input irr-date irr-de" value="${de}" onchange="formatPeriodFromInputs(${i})" style="flex:1;min-width:110px">
              </div>
            </td>
            <td>
              <select class="irr-status-sel" style="color:${sc};background:${sb};border-color:${sc}40" onchange="irrStatusChange(${i},this.value)">${opts}</select>
            </td>
            <td><input class="irr-input" value="${esc(r.note)}" placeholder="비고" onchange="irrUpdate(${i},'note',this.value)"></td>
            <td style="text-align:center"><button class="irr-del" onclick="irrDel(${i})">삭제</button></td>
          </tr>`;
        } else {
          s += `<tr>
            <td>${esc(r.name)}</td>
            <td><div class="irr-content-view">${esc(r.content)}</div></td>
            <td>${esc(r.period)}</td>
            <td><span style="color:${sc};background:${sb};border:1px solid ${sc}40;border-radius:4px;padding:2px 8px;font-size:12px">${esc(r.status)}</span></td>
            <td>${esc(r.note)}</td>
          </tr>`;
        }
      });
      s += `</tbody></table></div></div>`;
    }
    if (isAdmin) s += `<button class="btn-add-row" onclick="irrAdd('${weekKey}')" style="margin-top:6px">＋ ${label} 추가</button>`;
    s += `</div>`;
    return s;
  }

  const legacyGroup  = rows.map((r,i)=>({r,i})).filter(({r})=>r._legacy);
  const lastWeekGroup = rows.map((r,i)=>({r,i})).filter(({r})=>!r._legacy && resolveWeek(r)==='지난주');
  const thisWeekGroup = rows.map((r,i)=>({r,i})).filter(({r})=>!r._legacy && resolveWeek(r)==='계획');

  // 복구된 이전 데이터 표시
  if (legacyGroup.length) {
    html += `<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:#92400e">
      <strong>⚠ 이전에 저장된 내역 ${legacyGroup.length}건이 복구됐습니다.</strong>
      아래 내역을 확인 후 삭제하거나 다시 추가해 주세요.
    </div>`;
    html += irrTable(legacyGroup, '복구된 이전 내역', 'legacy');
    html += `<div style="border-top:1px solid #f1f5f9;margin-bottom:16px"></div>`;
  }

  html += irrTable(lastWeekGroup, '지난주 실행 내역', '지난주');
  html += `<div style="border-top:1px solid #f1f5f9;margin-bottom:16px"></div>`;
  html += irrTable(thisWeekGroup, '이번주 실행 계획', '계획');
  html += `</div></div>`;

  card.innerHTML = html;
  card.querySelectorAll('.irr-textarea').forEach(ta => autoResizeTA(ta));
}

// 초기화
loadData();
irrLoadFromServer();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
